name: Deploy MS-Tours to DigitalOcean

on:
  push:
    branches: ["main"]

env:
  REMOTE_DIR: /var/www/mstours
  SERVER_IP: 143.110.177.75

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # --------------------------------------------------
      # Checkout code
      # --------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4

      # --------------------------------------------------
      # Setup Node.js
      # --------------------------------------------------
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      # --------------------------------------------------
      # Frontend ENV
      # --------------------------------------------------
      - name: Create Frontend .env
        run: |
          echo "VITE_API_BASE_URL=${{ secrets.VITE_API_BASE_URL }}" > frontend/.env.production

      # --------------------------------------------------
      # Build Frontend
      # --------------------------------------------------
      - name: Build Frontend
        working-directory: frontend
        run: |
          npm ci || npm install --no-audit --prefer-offline
          npm run build

      # --------------------------------------------------
      # Validate SSH secret
      # --------------------------------------------------
      - name: Validate SSH private key secret
        run: |
          if [ -z "${{ secrets.DO_SSH_PRIVATE_KEY }}" ]; then
            echo "ERROR: DO_SSH_PRIVATE_KEY secret is not set"
            exit 1
          fi

      # --------------------------------------------------
      # Start SSH Agent
      # --------------------------------------------------
      - name: Start SSH agent
        uses: webfactory/ssh-agent@v0.5.3
        with:
          ssh-private-key: ${{ secrets.DO_SSH_PRIVATE_KEY }}

      # --------------------------------------------------
      # Add server to known_hosts
      # --------------------------------------------------
      - name: Add droplet to known_hosts
        env:
          DO_HOST: ${{ secrets.DO_SSH_HOST }}
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan "$DO_HOST" >> ~/.ssh/known_hosts

      # --------------------------------------------------
      # Ensure directories exist on server
      # --------------------------------------------------
      - name: Ensure directories exist on droplet
        env:
          DO_USER: ${{ secrets.DO_SSH_USER }}
          DO_HOST: ${{ secrets.DO_SSH_HOST }}
          REMOTE_DIR: ${{ env.REMOTE_DIR }}
        run: |
          ssh "$DO_USER@$DO_HOST" "
            sudo mkdir -p $REMOTE_DIR/backend &&
            sudo mkdir -p $REMOTE_DIR/frontend/dist &&
            sudo chown -R \$USER:\$USER $REMOTE_DIR
          "

      # --------------------------------------------------
      # Deploy Frontend
      # --------------------------------------------------
      - name: Deploy Frontend
        env:
          DO_USER: ${{ secrets.DO_SSH_USER }}
          DO_HOST: ${{ secrets.DO_SSH_HOST }}
          REMOTE_DIR: ${{ env.REMOTE_DIR }}
        run: |
          rsync -avz --delete \
            -e "ssh" \
            frontend/dist/ \
            "$DO_USER@$DO_HOST:$REMOTE_DIR/frontend/dist/"

      # --------------------------------------------------
      # Deploy Backend
      # --------------------------------------------------
      - name: Deploy Backend
        env:
          DO_USER: ${{ secrets.DO_SSH_USER }}
          DO_HOST: ${{ secrets.DO_SSH_HOST }}
          REMOTE_DIR: ${{ env.REMOTE_DIR }}
        run: |
          rsync -avz --delete \
            --exclude ".env" \
            --exclude "node_modules" \
            -e "ssh" \
            backend/ \
            "$DO_USER@$DO_HOST:$REMOTE_DIR/backend/"

      # --------------------------------------------------
      # Install Backend Dependencies & Restart PM2
      # --------------------------------------------------
      - name: Install dependencies and restart backend
        env:
          DO_USER: ${{ secrets.DO_SSH_USER }}
          DO_HOST: ${{ secrets.DO_SSH_HOST }}
          REMOTE_DIR: ${{ env.REMOTE_DIR }}
        run: |
          ssh "$DO_USER@$DO_HOST" "
            cd $REMOTE_DIR/backend &&
            npm install --production &&
            pm2 restart mstours-backend || pm2 start ecosystem.config.cjs --env production &&
            pm2 save
          "

      # --------------------------------------------------
      # Reload Nginx
      # --------------------------------------------------
      - name: Reload Nginx
        env:
          DO_USER: ${{ secrets.DO_SSH_USER }}
          DO_HOST: ${{ secrets.DO_SSH_HOST }}
        run: |
          ssh "$DO_USER@$DO_HOST" "
            sudo nginx -t &&
            sudo systemctl reload nginx
          "
